<section class="cases section-gray">
  <div class="container">

    <div class="section-header">
      <h2>Estudos de Caso</h2>
      <p>Alguns exemplos de atuação técnica aplicada</p>
    </div>

    @for (caseItem of cases; track caseItem.id) {
      <div class="case-card">
        <div class="case-step">
          <span>Problema</span>
          <p>{{ caseItem.problem }}</p>
        </div>

        <div class="divider"></div>

        <div class="case-step">
          <span>Solução</span>
          <p>{{ caseItem.solution }}</p>
        </div>

        <div class="divider"></div>

        <div class="case-step highlight">
          <span>Resultado</span>
          <p>{{ caseItem.result }}</p>
        </div>
      </div>
    }
  </div>
</section>
