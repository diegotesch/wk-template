<section class="services section-gray" id="services">
  <div class="container">
    <h2>Serviços</h2>

    <div class="grid">
      @for (service of services; track service.id) {
      <div class="card">
        <h3>{{ service.title }}</h3>
        <p>{{ service.description }}</p>
      </div>
      }
    </div>
  </div>
</section>
