<section class="projects section-light" id="projects">
  <h2>Projetos</h2>

  <div class="grid">
    @for (project of projects; track project.id) {
      <div class="card">
        <img [src]="project.image" />
        <div class="content">
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>
        </div>
      </div>
    }
  </div>
</section>
