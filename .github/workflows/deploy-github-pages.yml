name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build (base href for GitHub Pages)
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            BASE="/"
          else
            BASE="/${REPO_NAME}/"
          fi
          echo "Using base-href: $BASE"
          npx ng build --configuration production --base-href "$BASE"

      - name: SPA fallback (refreshes em rotas profundas)
        run: cp dist/wk-template/browser/index.html dist/wk-template/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/wk-template/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
